# Trivy ignore rules — consumed by the Security Scan jobs in
# .github/workflows/docker-image.yml (release-time scan) and
# .github/workflows/security-scan.yml (scheduled/on-demand re-scan of the
# published image), both via the `trivyignores` input. The scheduled scan is
# what makes an `expired_at` below actually resurface the alert on time,
# rather than only whenever the next release happens to be cut.
#
# Scope every entry as narrowly as possible (an `id` + `paths`, and an
# `expired_at` so the suppression self-expires and the alert resurfaces for
# re-triage rather than being buried forever). Only suppress a finding we
# genuinely cannot act on yet — never a fixable one.
#
# Package-level suppression lives in the companion `.trivy/ignore-policy.rego`
# (wired into the same scan jobs via `ignore-policy`): it drops the continuous
# stream of Linux *kernel* CVEs Trivy maps to `linux-libc-dev` — compile-time
# kernel headers that ship no running code, unreachable in a container running
# on the host kernel. That class can't be enumerated as CVE ids here (it grows
# every scan), so it is scoped by package name there rather than listed here.

vulnerabilities:
  # Two Go standard-library vulnerabilities baked into the `docker` CLI binary
  # (docker-ce-cli), which is compiled and released by Docker — we install the
  # published .deb, we do not build it, so the embedded Go version is entirely
  # upstream's to bump. Both were fixed only in Go 1.25.12 / 1.26.5, released
  # 2026-07-08; a docker-ce-cli rebuilt against a patched Go is not yet
  # published, so there is no newer package to install (Trivy reports them as
  # "fixed" because the Go vuln DB knows the fixed toolchain version, not
  # because a fixed docker-ce-cli exists).
  #
  # The docker runner that uses this CLI is opt-in and OFF by default (the
  # `docker_runner` setting / MCPE_DOCKER_RUNNER), and the daemon is never run
  # in-image, so the CLI is inert on a default deployment. Neither issue is
  # reachable through mcpelevator itself:
  #   - CVE-2026-39822 (os.Root symlink following → directory traversal) is a
  #     library API misuse hazard for programs that call os.Root; the docker
  #     CLI's own use is not an attacker-controlled traversal surface here.
  #   - CVE-2026-42505 (crypto/tls Encrypted Client Hello PSK-identity leak)
  #     only matters for ECH-enabled TLS clients; it does not affect the
  #     control plane's own HTTP surface.
  #
  # Remediation is simply to rebuild on a docker-ce-cli that ships patched Go —
  # the Dockerfile reinstalls the latest .deb on every release (its install layer
  # is keyed on APP_VERSION, so a durably-cached layer can't re-ship a stale binary),
  # so the next release build picks up the fix automatically once Docker publishes it.
  # Re-triage when this expires: if a rebuilt docker-ce-cli is out, drop these
  # entries; if not, confirm the package is still unpatched and extend.
  - id: CVE-2026-39822
    paths:
      - "usr/bin/docker"
    expired_at: 2026-10-13
    statement: >-
      Go os.Root symlink traversal in the upstream-built docker-ce-cli binary;
      fixed only in Go 1.25.12/1.26.5 (2026-07-08), awaiting a docker-ce-cli
      rebuild. The docker runner is opt-in and disabled by default.
  - id: CVE-2026-42505
    paths:
      - "usr/bin/docker"
    expired_at: 2026-10-13
    statement: >-
      Go crypto/tls Encrypted Client Hello PSK-identity leak in the
      upstream-built docker-ce-cli binary; fixed only in Go 1.25.12/1.26.5
      (2026-07-08), awaiting a docker-ce-cli rebuild. The docker runner is
      opt-in and disabled by default.
