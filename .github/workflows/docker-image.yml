name: Build and Push Docker Image

# Builds the multi-arch image and pushes it to GHCR (ghcr.io/pacnpal/mcpelevator).
#
# Runs on GitHub-hosted runners (ubuntu-latest). Docker and buildx are
# pre-installed on GitHub-hosted runners, and arm64 layers are built via QEMU.
#
# Trigger: ONLY a published GitHub release whose tag is a full semver (vX.Y.Z,
# optionally -prerelease). There is deliberately no manual/workflow_dispatch path:
# every published image is stamped with a real release version (APP_VERSION), so
# the running instance reports e.g. `v1.2.3` — never `latest`/`dev`/a bare image
# tag. A release tagged with anything that isn't full semver fails the build.
#
# No secrets required: GHCR auth uses the automatic GITHUB_TOKEN.

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  lint:
    name: Lint Dockerfile
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error
          ignore: DL3008,DL3013

  build:
    name: Build and Push
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: ${{ env.PLATFORMS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: version
        run: |
          # Only releases trigger this workflow, so the version is always the
          # release tag with any leading `v` stripped (v1.2.3 -> 1.2.3).
          VERSION="${GITHUB_REF_NAME#v}"
          # Reject anything outside a safe tag charset before it reaches later steps.
          case "$VERSION" in
            ''|*[!A-Za-z0-9_.-]*)
              echo "Invalid image tag: $VERSION" >&2
              exit 1
              ;;
          esac
          # Require a full semver (X.Y.Z, optionally -prerelease/+build). A release
          # tagged with anything else (e.g. "docs-2026") must not publish an image:
          # every image has to carry a real release version in APP_VERSION so the
          # running instance reports the version, never a bare tag like "latest".
          case "$VERSION" in
            [0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "Refusing to build: release tag '$VERSION' is not a full semver (X.Y.Z)." >&2
              exit 1
              ;;
          esac
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${VERSION}"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.GHCR_IMAGE }}
          tags: |
            # Versioned tags from the release tag (vX.Y.Z)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            # latest for a stable release, beta for a prerelease
            type=raw,value=latest,enable=${{ !github.event.release.prerelease }}
            type=raw,value=beta,enable=${{ github.event.release.prerelease }}
            # always a git short SHA tag
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=mcpelevator
            org.opencontainers.image.description=Elevate stdio MCP servers into authenticated HTTP endpoints
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: APP_VERSION=${{ steps.version.outputs.version }}
          # gha cache is fast (capped/evicted ~7 days); the GHCR :buildcache tag is
          # durable so a build after eviction still skips the slow QEMU arm64 layers.
          cache-from: |
            type=gha
            type=registry,ref=${{ env.GHCR_IMAGE }}:buildcache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=${{ env.GHCR_IMAGE }}:buildcache,mode=max,image-manifest=true,oci-mediatypes=true
          provenance: true
          sbom: true

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.GHCR_IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    permissions:
      security-events: write
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.GHCR_IMAGE }}@${{ needs.build.outputs.image-digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          # Without this, trivy-action's SARIF mode deliberately ignores the
          # severity filter above and reports ALL severities.
          limit-severities-for-sarif: true
          # Narrowly-scoped, self-expiring suppressions for findings we can't act
          # on yet (e.g. Go stdlib CVEs baked into the upstream-built docker CLI
          # binary, pending a docker-ce-cli rebuild). See the file for rationale.
          trivyignores: .trivyignore.yaml

      - name: Upload Trivy results to the Security tab
        uses: github/codeql-action/upload-sarif@ab28d5ce09b08e4700b2296d39d684a7ac71d1e7 # v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: trivy-results.sarif
          # This workflow only fires on release:published, so GITHUB_REF is the
          # tag (refs/tags/vX.Y.Z). Code-scanning alerts are tracked per-ref and
          # only auto-close when a newer analysis on the SAME ref omits them —
          # a tag scan can never clear an alert on main. Pin the upload to main
          # (release commits are cut from main) so each release reconciles the
          # default-branch alert set instead of piling up dead per-tag analyses.
          # Between releases, security-scan.yml re-scans the published image on
          # a schedule (or on dispatch) and uploads into this same stream.
          ref: refs/heads/main
          sha: ${{ github.sha }}
          # Analyses are matched per (ref, category), and with no explicit
          # category upload-sarif derives "<workflow path>:<job id>" — which
          # would differ per workflow file and silo security-scan.yml's uploads
          # away from this one. Pin the category explicitly, to the exact value
          # this job historically auto-derived, so pre-existing alerts stay in
          # the same stream. Must stay byte-identical to the category in
          # security-scan.yml's upload step.
          category: ".github/workflows/docker-image.yml:scan"

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build, scan]
    if: always()
    permissions: {}

    steps:
      - name: Generate summary
        run: |
          {
            echo "## mcpelevator image"
            echo ""
            echo "- **Version:** \`${{ needs.build.outputs.version }}\`"
            echo "- **Image:** \`${{ env.GHCR_IMAGE }}\`"
            echo "- **Digest:** \`${{ needs.build.outputs.image-digest }}\`"
            echo "- **Platforms:** \`${{ env.PLATFORMS }}\`"
            echo ""
            echo "Pull: \`docker pull ${{ env.GHCR_IMAGE }}:${{ needs.build.outputs.version }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
