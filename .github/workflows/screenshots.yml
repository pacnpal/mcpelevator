name: Screenshots

# Regenerate the UI screenshots in docs/screenshots/ with shot-scraper and commit
# them back. Builds the SPA, boots the backend (which serves it + the /api control
# plane), seeds a demo set of servers, then captures the shots defined in shots.yml.
#
# Trigger: manual, or a push to main that touches the UI, the backend, or the
# screenshot config. The push back uses the automatic GITHUB_TOKEN, which does not
# re-trigger workflows, so there is no loop.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'shots.yml'
      - 'scripts/screenshots-serve.sh'
      - '.github/workflows/screenshots.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  screenshots:
    name: Take screenshots
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Don't leave any checkout token on disk while npm/uv/pip/cargo/npx/uvx run.
          # The separate commit job is the only job with write permission.
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright

      - name: Cache Cargo (oxipng)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
          key: ${{ runner.os }}-cargo-oxipng

      - name: Build the SPA
        run: cd frontend && npm ci && npm run build

      - name: Install backend dependencies
        # --locked: fail if uv.lock is stale rather than silently rewriting it, so
        # screenshots always come from the committed dependency set.
        run: cd backend && uv sync --locked

      - name: Install shot-scraper + Chromium
        run: |
          pip install shot-scraper
          shot-scraper install

      - name: Install Oxipng if it is not installed
        run: which oxipng || cargo install oxipng

      - name: Boot backend + seed demo servers
        run: bash scripts/screenshots-serve.sh

      - name: Take screenshots
        # --fail turns HTTP errors and wait_for timeouts into a non-zero exit, so a
        # shot that never loads (or a thrown error in the search script) fails the
        # job instead of committing a blank/wrong image.
        run: shot-scraper multi shots.yml --retina --fail

      - name: Optimize PNGs
        run: oxipng -o 4 -i 0 --strip safe docs/screenshots/*.png

      - name: Stop screenshot backend
        # Stop the backend and its child MCP processes before exposing a
        # write-capable token in the commit step below. The demo servers are
        # intentionally public npx/uvx packages, so they must not survive into
        # any token-bearing step on the runner.
        if: always()
        run: |-
          if [ ! -s /tmp/mcpe-backend.pid ]; then
            exit 0
          fi
          backend_pid="$(cat /tmp/mcpe-backend.pid)"
          # Terminate descendants first so stdio MCP children cannot outlive the
          # backend process that launched them. Repeat briefly for grandchildren
          # that may be reparented during shutdown.
          for _ in $(seq 1 5); do
            pkill -TERM -P "${backend_pid}" 2>/dev/null || true
            kill -TERM "${backend_pid}" 2>/dev/null || true
            sleep 1
            kill -0 "${backend_pid}" 2>/dev/null || break
          done
          pkill -KILL -P "${backend_pid}" 2>/dev/null || true
          kill -KILL "${backend_pid}" 2>/dev/null || true

      - name: Upload screenshot artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: screenshots
          path: docs/screenshots/*.png
          if-no-files-found: error

  commit:
    name: Commit screenshots
    runs-on: ubuntu-latest
    needs: screenshots
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download screenshot artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: screenshots
          path: docs/screenshots

      - name: Commit and push
        env:
          GH_TOKEN: ${{ github.token }}
        run: |-
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/screenshots
          git commit -m "chore(screenshots): refresh UI screenshots [skip ci]" || exit 0
          # Credentials aren't persisted on the checkout, so authenticate the
          # remote here (only this step needs write access).
          remote="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git pull --rebase "${remote}" "${GITHUB_REF_NAME}"
          git push "${remote}" "HEAD:${GITHUB_REF_NAME}"
