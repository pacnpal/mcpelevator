name: Screenshots

# Regenerate the UI screenshots in docs/screenshots/ with shot-scraper and commit
# them back. Builds the SPA, boots the backend (which serves it + the /api control
# plane), seeds a demo set of servers, then captures the shots defined in shots.yml.
#
# Trigger: manual, or a push to main that touches the UI, the backend, or the
# screenshot config. The push back uses the automatic GITHUB_TOKEN, which does not
# re-trigger workflows, so there is no loop.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'shots.yml'
      - 'scripts/screenshots-serve.sh'
      - '.github/workflows/screenshots.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  screenshots:
    name: Take screenshots
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright

      - name: Cache Cargo (oxipng)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
          key: ${{ runner.os }}-cargo-oxipng

      - name: Build the SPA
        run: cd frontend && npm ci && npm run build

      - name: Install backend dependencies
        run: cd backend && uv sync

      - name: Install shot-scraper + Chromium
        run: |
          pip install shot-scraper
          shot-scraper install

      - name: Install Oxipng if it is not installed
        run: which oxipng || cargo install oxipng

      - name: Boot backend + seed demo servers
        run: bash scripts/screenshots-serve.sh

      - name: Take screenshots
        run: shot-scraper multi shots.yml --retina

      - name: Optimize PNGs
        run: oxipng -o 4 -i 0 --strip safe docs/screenshots/*.png

      - name: Commit and push
        run: |-
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/screenshots
          git commit -m "chore(screenshots): refresh UI screenshots [skip ci]" || exit 0
          git pull --rebase
          git push
