name: Docker Build Check

# Validates that the production image still builds when a PR changes the
# Dockerfile or docker-compose (e.g. a Renovate base-image / uv-image bump).
# The image is otherwise only built on a published release (docker-image.yml),
# so without this a base-image update could automerge to main and break the
# next release build. Single-arch, no push — a strict subset of the release
# build, enough to catch a broken build early.

on:
  pull_request:
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'docker-compose.yml'
      - '.github/workflows/docker-build.yml'
      # Dependency manifests/lockfiles feed the image build (npm ci, uv sync),
      # so validate the slim image for automerged npm/Python updates too — a dep
      # can pass host CI yet fail to build in the slim runtime.
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
      - 'backend/pyproject.toml'
      - 'backend/uv.lock'

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build image (no push)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca # v3.9.0
      - name: Build image
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: .
          push: false
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
