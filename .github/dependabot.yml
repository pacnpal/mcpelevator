# Basic `dependabot.yml` file with
# minimum configuration for two package managers

version: 2
updates:
  # Enable version updates for npm
  - package-ecosystem: "npm"
    # Look for `package.json` and `lock` files in the `root` directory
    directory: "/frontend"
    # Check the npm registry for updates every day (weekdays)
    schedule:
      interval: "daily"
    ignore:
      # TypeScript 7.x is the native Go port, which does not yet expose a
      # stable programmatic API. Tools that embed the compiler — svelte-check,
      # @sveltejs/kit — can only target the TS 6.0 API, so `npm run check`
      # breaks under TS 7. Stay on 6.x until the Svelte toolchain adopts the
      # TS 7.1 API. Revisit by dropping this ignore once svelte-check ships
      # TS 7 support and @sveltejs/kit widens its typescript peer to ^7.0.0.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # Enable version updates for Docker
  - package-ecosystem: "docker"
    # Look for a `Dockerfile` in the `root` directory
    directory: "/"
    # Check for updates once a week
    schedule:
      interval: "weekly"
  # Enable version updates for npm
  - package-ecosystem: "uv"
    # Look for `package.json` and `lock` files in the `root` directory
    directory: "/backend"
    # Check the npm registry for updates every day (weekdays)
    schedule:
      interval: "daily"
  # Enable version updates for npm
  - package-ecosystem: "pip"
    # Look for `package.json` and `lock` files in the `root` directory
    directory: "/backend"
    # Check the npm registry for updates every day (weekdays)
    schedule:
      interval: "daily"

  # Enable version updates for Docker
  - package-ecosystem: "docker-compose"
    # Look for a `Dockerfile` in the `root` directory
    directory: "/"
    # Check for updates once a week
    schedule:
      interval: "weekly"
        # Enable version updates for Docker
  - package-ecosystem: "github-actions"
    # Look for a `Dockerfile` in the `root` directory
    directory: "/"
    # Check for updates once a week
    schedule:
      interval: "weekly"
