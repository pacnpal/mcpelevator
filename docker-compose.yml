services:
  mcpelevator:
    build: .
    image: mcpelevator:latest
    container_name: mcpelevator
    # Secure default: publish to the host loopback only. To reach it from other
    # devices (e.g. your phone), front it with a tunnel (Tailscale / Cloudflare
    # Tunnel) that terminates auth. Do NOT simply change this to "8080:8080": the
    # MCPE_TRUSTED_PROXIES gateway-trust below treats Docker-forwarded clients as
    # loopback, so a direct off-host request could reach the unauthenticated /api.
    # If you must bind off-host, remove MCPE_TRUSTED_PROXIES and put an
    # authenticating proxy in front of /api.
    #
    # LAN access for a self-hosted box (Unraid / NAS): turn on the `allow_private_lan`
    # setting (Settings → "Allow access from devices on your local network") so a
    # private-IP-literal Host from a private-network peer passes the guard, and reach
    # it at http://<box-lan-ip>:8080. For that peer check to see the REAL client IP,
    # use HOST networking (see the network_mode block below) — with bridge + port
    # publishing Docker masquerades every client to the gateway IP, so the peer gate
    # can no longer tell a LAN client from a public one and you'd lean entirely on the
    # control-plane admin token (which allow_private_lan requires anyway) and per-server
    # bearer auth. Either way, generate an admin token first.
    ports:
      - "127.0.0.1:8080:8080"
    # --- LAN access via HOST networking (recommended for Unraid/NAS) ---------------
    # Uncomment `network_mode: host` AND comment out the `ports:` and `networks:`
    # blocks (host networking ignores both). The container then shares the host's
    # network stack, so it sees real client IPs and `allow_private_lan` gates LAN vs.
    # public correctly. Drop MCPE_TRUSTED_PROXIES below (there's no bridge gateway to
    # trust). Linux only — Docker Desktop on macOS/Windows doesn't support it.
    # network_mode: host
    networks:
      - mcpe
    volumes:
      - mcpe-data:/data
      # Opt-in sibling Docker (runner=docker, M7). This is ROOT-EQUIVALENT on the
      # host — enable only deliberately:
      # - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - MCPE_HOST=0.0.0.0
      # The container binds 0.0.0.0, so a host-loopback request reaches it from the
      # compose network's GATEWAY (fixed below). Trust ONLY that one /32 — not the
      # whole bridge range, which would also trust sibling containers on the network.
      # SAFE only while the port is published to 127.0.0.1 (the default); for an
      # off-host bind, drop this and use expose mode + auth instead.
      - MCPE_TRUSTED_PROXIES=${MCPE_GATEWAY:-172.20.0.1}/32
      # Headless LAN bootstrap: seed the `allow_private_lan` setting on first boot so a
      # box with no loopback browser can be reached from the LAN. It turns control-plane
      # auth on, so the admin token is minted and PRINTED TO THE LOGS on first start —
      # read it there to log in. Pair with host networking above so the peer gate works.
      # - MCPE_ALLOW_PRIVATE_LAN=true
      # Absolute URL clients use to reach this instance (behind a tunnel/proxy):
      # - MCPE_PUBLIC_BASE_URL=https://mcp.example.com
    restart: unless-stopped

networks:
  mcpe:
    # Fixed subnet so the gateway (the only trusted proxy above) is a stable address.
    # Override MCPE_SUBNET / MCPE_GATEWAY if 172.20.0.0/24 clashes with a host network
    # or you run two stacks side by side (keep the gateway inside the subnet).
    ipam:
      config:
        - subnet: ${MCPE_SUBNET:-172.20.0.0/24}
          gateway: ${MCPE_GATEWAY:-172.20.0.1}

volumes:
  mcpe-data:
